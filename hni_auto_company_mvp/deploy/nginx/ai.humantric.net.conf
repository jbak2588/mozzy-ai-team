# Example Nginx server block for HNI auto-company public webhook mode.
#
# Replace the placeholder certificate paths below with the real files issued
# for ai.humantric.net. Do not place Telegram tokens or webhook secrets in
# this Nginx config.

server {
    listen 80;
    listen [::]:80;
    server_name ai.humantric.net;

    # Public webhook deployment must use HTTPS only.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.humantric.net;

    # Replace these with the real certificate and key for ai.humantric.net.
    ssl_certificate /etc/letsencrypt/live/ai.humantric.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.humantric.net/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Adjust this if your deployment expects larger payloads.
    client_max_body_size 10m;

    # Telegram webhook path is proxied to the local backend.
    # Keep the backend private on 127.0.0.1:8787.
    location /api/v1/integrations/telegram/webhook {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
    }

    # Status and helper routes may be kept local-only by firewall policy.
    # If you expose them publicly, put an additional access control layer
    # in front of them. This config only proxies the requests.
    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
    }
}
